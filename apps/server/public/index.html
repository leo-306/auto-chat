<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>auto-chat Jobs</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 32px; color: #202124; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border-bottom: 1px solid #e5e7eb; padding: 10px 8px; text-align: left; font-size: 14px; }
      th { color: #5f6368; font-weight: 600; }
      .status { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      button { border: 1px solid #d0d7de; background: white; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
      .actions { display: flex; align-items: center; gap: 10px; }
      .danger { border-color: #f3b5ae; background: #fff4f2; color: #b42318; }
      .danger:disabled { cursor: not-allowed; opacity: 0.6; }
      .notice { min-height: 20px; margin: 0 0 12px; color: #5f6368; font-size: 13px; }
      .notice.error { color: #b42318; }
      .outputs { display: flex; flex-direction: column; gap: 4px; max-width: 420px; }
      .preview { color: #3c4043; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
  </head>
  <body>
    <h1>auto-chat Jobs</h1>
    <p id="notice" class="notice"></p>
    <table>
      <thead><tr><th>ID</th><th>Platform</th><th>Status</th><th>Outputs</th><th>Updated</th><th>Error</th><th>Action</th></tr></thead>
      <tbody id="jobs"></tbody>
    </table>
    <script>
      let deletingId = null;

      async function refresh() {
        const jobs = await fetch('/jobs').then(r => r.json());
        document.querySelector('#jobs').innerHTML = jobs.map(job => `
          <tr>
            <td>${escapeHtml(job.id)}</td>
            <td>${escapeHtml(platformLabel(job.platform))}</td>
            <td class="status">${escapeHtml(job.status)}</td>
            <td>${formatOutputs(job)}</td>
            <td>${escapeHtml(job.updatedAt)}</td>
            <td>${escapeHtml(job.errorMessage || '')}</td>
            <td>
              <div class="actions">
                ${job.conversationUrl ? `<a href="${escapeAttribute(job.conversationUrl)}" target="_blank">${escapeHtml(platformLabel(job.platform))}</a>` : ''}
                <button class="danger" data-delete="${escapeAttribute(job.id)}" ${deletingId === job.id ? 'disabled' : ''}>
                  ${deletingId === job.id ? 'Deleting...' : 'Delete'}
                </button>
              </div>
            </td>
          </tr>
        `).join('');
        await hydrateTextPreviews(jobs);
      }

      document.querySelector('#jobs').addEventListener('click', async event => {
        const button = event.target.closest('button[data-delete]');
        if (!button) return;
        const id = button.dataset.delete;
        if (!confirm(`Delete job ${id}? This will also remove its saved files.`)) return;
        deletingId = id;
        setNotice(`Deleting ${id}...`);
        await refresh();
        try {
          const response = await fetch(`/jobs/${encodeURIComponent(id)}`, { method: 'DELETE' });
          if (!response.ok) throw new Error(`${response.status} ${await response.text()}`);
          setNotice(`Deleted ${id}.`);
        } catch (error) {
          setNotice(`Delete failed: ${error}`, true);
        } finally {
          deletingId = null;
          await refresh();
        }
      });

      function setNotice(message, isError = false) {
        const notice = document.querySelector('#notice');
        notice.textContent = message;
        notice.classList.toggle('error', isError);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      function formatOutputs(job) {
        if (job.mode === 'text') {
          const file = job.textOutputFile || job.outputFiles[0];
          if (!file) return '';
          const name = outputName(file);
          return `
            <div class="outputs">
              <a href="${assetUrl(job.id, name)}" target="_blank">${escapeHtml(name)}</a>
              <span class="preview" data-text-output="${escapeAttribute(job.id)}" data-output-name="${escapeAttribute(name)}">Loading...</span>
            </div>
          `;
        }
        if (!job.outputFiles.length) return '';
        return `
          <div class="outputs">
            ${job.outputFiles.map(file => {
              const name = outputName(file);
              return `<a href="${assetUrl(job.id, name)}" target="_blank">${escapeHtml(name)}</a>`;
            }).join('')}
          </div>
        `;
      }

      function platformLabel(platform) {
        return platform === 'gemini' ? 'Gemini' : 'GPT';
      }

      async function hydrateTextPreviews(jobs) {
        await Promise.all(jobs
          .filter(job => job.mode === 'text' && (job.textOutputFile || job.outputFiles[0]))
          .map(async job => {
            const file = job.textOutputFile || job.outputFiles[0];
            const name = outputName(file);
            const target = document.querySelector(`[data-text-output="${cssEscape(job.id)}"][data-output-name="${cssEscape(name)}"]`);
            if (!target) return;
            try {
              const text = await fetch(assetUrl(job.id, name)).then(response => response.ok ? response.text() : '');
              target.textContent = text.replace(/\s+/g, ' ').trim().slice(0, 160) || 'Empty text output';
            } catch {
              target.textContent = 'Preview unavailable';
            }
          }));
      }

      function outputName(file) {
        const normalized = String(file).replaceAll('\\', '/');
        return normalized.slice(normalized.lastIndexOf('/') + 1);
      }

      function assetUrl(jobId, name) {
        return `/job-assets/${encodeURIComponent(jobId)}/outputs/${encodeURIComponent(name)}`;
      }

      function cssEscape(value) {
        return String(value).replace(/["\\]/g, '\\$&');
      }

      refresh();
      setInterval(refresh, 3000);
    </script>
  </body>
</html>
