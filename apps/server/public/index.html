<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>auto-chat 任务中心</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --surface: #ffffff;
        --surface-soft: #f8fafc;
        --border: #e2e8f0;
        --border-strong: #cbd5e1;
        --text: #172033;
        --muted: #64748b;
        --primary: #4f46e5;
        --primary-soft: #eef2ff;
        --danger: #b42318;
        --danger-soft: #fff1f2;
        --shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 12px 28px rgba(15, 23, 42, 0.06);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--primary); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button { font: inherit; }

      .page { width: min(1680px, 100%); margin: 0 auto; padding: 32px 28px 48px; }
      .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
      h1 { margin: 0 0 6px; font-size: clamp(26px, 3vw, 36px); line-height: 1.15; letter-spacing: -0.035em; }
      .subtitle { margin: 0; color: var(--muted); font-size: 14px; }
      .live-pill { display: inline-flex; align-items: center; gap: 8px; flex: none; padding: 8px 12px; border: 1px solid #bbf7d0; border-radius: 999px; background: #f0fdf4; color: #166534; font-size: 13px; font-weight: 650; }
      .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12); }

      .tabs { display: inline-flex; gap: 4px; margin-bottom: 18px; padding: 4px; border: 1px solid var(--border); border-radius: 11px; background: #e9edf5; }
      .tab-button { border: 0; border-radius: 8px; padding: 8px 15px; background: transparent; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 700; }
      .tab-button:hover { color: var(--text); }
      .tab-button[aria-selected="true"] { background: var(--surface); color: var(--primary); box-shadow: 0 1px 3px rgba(15, 23, 42, 0.12); }
      .tab-panel[hidden] { display: none; }

      .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 16px; }
      .stat { padding: 16px 18px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface); box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03); }
      .stat-label { color: var(--muted); font-size: 12px; font-weight: 650; }
      .stat-value { margin-top: 5px; font-size: 25px; line-height: 1; font-weight: 750; font-variant-numeric: tabular-nums; }

      .panel { border: 1px solid var(--border); border-radius: 16px; background: var(--surface); box-shadow: var(--shadow); overflow: hidden; }
      .panel-heading { padding: 17px 20px 14px; border-bottom: 1px solid var(--border); }
      .panel-heading h2 { margin: 0; font-size: 15px; letter-spacing: -0.01em; }
      .panel-heading p { margin: 5px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
      .definition-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); padding: 6px 20px 14px; }
      .definition { min-width: 0; padding: 11px 8px 10px 0; }
      .definition dt { margin: 0 0 4px; color: #334155; font: 650 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; }
      .definition dd { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }
      .config-value { display: inline-flex; max-width: 100%; padding: 2px 7px; border-radius: 6px; background: var(--surface-soft); color: #0f172a; font: 650 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; white-space: normal; }

      .table-panel { overflow: hidden; }
      .table-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; border-bottom: 1px solid var(--border); }
      .table-toolbar h2 { margin: 0; font-size: 17px; }
      .table-toolbar p { margin: 4px 0 0; color: var(--muted); font-size: 12px; }
      .toolbar-actions { display: flex; align-items: center; gap: 12px; }
      .secondary-button { border: 1px solid var(--border-strong); border-radius: 8px; padding: 7px 11px; background: var(--surface); color: #334155; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .secondary-button:hover { border-color: #a5b4fc; background: var(--primary-soft); color: #4338ca; }
      .notice { min-height: 18px; margin: 0; color: var(--muted); font-size: 12px; text-align: right; }
      .notice.error { color: var(--danger); }
      .table-scroll { overflow-x: auto; }
      table { width: 100%; min-width: 1320px; table-layout: fixed; border-collapse: separate; border-spacing: 0; }
      .col-id { width: 13%; }
      .col-platform { width: 7%; }
      .col-status { width: 10%; }
      .col-config { width: 27%; }
      .col-output { width: 8%; }
      .col-tab { width: 9%; }
      .col-updated { width: 8%; }
      .col-error { width: 12%; }
      .col-action { width: 140px; }
      th, td { padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; font-size: 13px; }
      th { position: sticky; top: 0; z-index: 1; background: var(--surface-soft); color: #64748b; font-size: 11px; font-weight: 750; letter-spacing: 0.055em; text-transform: uppercase; }
      tbody tr { transition: background 120ms ease; }
      tbody tr:hover { background: #fafbff; }
      tbody tr:last-child td { border-bottom: 0; }
      .job-id-cell { display: flex; align-items: flex-start; gap: 7px; min-width: 0; }
      .job-id { min-width: 0; max-width: 220px; flex: 1; color: #1e293b; font: 650 12px/1.55 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; }
      .copy-id-button { flex: none; border: 1px solid var(--border); border-radius: 6px; padding: 3px 6px; background: var(--surface-soft); color: var(--muted); cursor: pointer; font-size: 10px; font-weight: 700; white-space: nowrap; }
      .copy-id-button:hover { border-color: #a5b4fc; background: var(--primary-soft); color: #4338ca; }
      .copy-id-button:disabled { cursor: default; opacity: 0.7; }
      .platform { font-weight: 700; }
      .mode { display: block; margin-top: 3px; color: var(--muted); font-size: 11px; }
      .status { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 9px; background: #f1f5f9; color: #475569; font: 650 11px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; }
      .status.done { background: #ecfdf3; color: #067647; }
      .status.queued { background: #eff6ff; color: #1d4ed8; }
      .status.running { background: #fffbeb; color: #a15c07; }
      .status.failed { background: var(--danger-soft); color: var(--danger); }
      .config-summary { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 7px; }
      .chip { padding: 3px 7px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface-soft); color: #475569; font-size: 10px; line-height: 1.35; white-space: nowrap; }
      .chip.accent { border-color: #c7d2fe; background: var(--primary-soft); color: #4338ca; }
      details { font-size: 12px; }
      summary { width: fit-content; color: var(--primary); cursor: pointer; font-weight: 650; }
      summary:hover { text-decoration: underline; }
      .json { width: 440px; max-width: 100%; max-height: 340px; margin: 8px 0 0; padding: 12px; overflow: auto; border: 1px solid var(--border); border-radius: 9px; background: #0f172a; color: #dbeafe; font: 11px/1.6 ui-monospace, SFMono-Regular, Menlo, monospace; white-space: pre-wrap; overflow-wrap: anywhere; }
      .outputs { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; max-width: 130px; }
      .output-link { display: inline-flex; align-items: center; gap: 5px; font-weight: 650; }
      .preview { width: 120px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
      .tab-link { display: inline-flex; align-items: center; gap: 6px; padding: 5px 9px; border: 1px solid #c7d2fe; border-radius: 7px; background: var(--primary-soft); font-size: 12px; font-weight: 700; white-space: nowrap; }
      .empty-value { color: #94a3b8; }
      time { display: block; color: #475569; font-size: 12px; line-height: 1.45; white-space: nowrap; font-variant-numeric: tabular-nums; }
      .error-message { display: block; max-width: 250px; color: var(--danger); font-size: 12px; line-height: 1.45; overflow-wrap: anywhere; }
      .danger { border: 1px solid #fecdd3; border-radius: 7px; padding: 6px 10px; background: #fff7f7; color: var(--danger); cursor: pointer; font-size: 12px; font-weight: 650; white-space: nowrap; }
      .danger:hover { border-color: #fda4af; background: var(--danger-soft); }
      .danger:disabled { cursor: not-allowed; opacity: 0.55; }
      .row-actions { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
      .retry-button { border: 1px solid #c7d2fe; border-radius: 7px; padding: 6px 10px; background: var(--primary-soft); color: #4338ca; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .retry-button:hover { border-color: #a5b4fc; background: #e0e7ff; }
      .retry-button:disabled { cursor: not-allowed; opacity: 0.55; }
      .recheck-button { border: 1px solid #bae6fd; border-radius: 7px; padding: 6px 10px; background: #f0f9ff; color: #0369a1; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap; }
      .recheck-button:hover { border-color: #7dd3fc; background: #e0f2fe; }
      .recheck-button:disabled { cursor: not-allowed; opacity: 0.55; }
      .empty-row { padding: 42px 16px; color: var(--muted); text-align: center; }

      dialog { width: min(820px, calc(100vw - 32px)); max-height: min(760px, calc(100vh - 48px)); padding: 0; overflow: hidden; border: 1px solid var(--border); border-radius: 16px; background: var(--surface); color: var(--text); box-shadow: 0 24px 70px rgba(15, 23, 42, 0.25); }
      dialog::backdrop { background: rgba(15, 23, 42, 0.48); backdrop-filter: blur(2px); }
      .dialog-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; padding: 20px 22px 16px; border-bottom: 1px solid var(--border); }
      .dialog-header h2 { margin: 0; font-size: 18px; }
      .dialog-header p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
      .dialog-close { width: 32px; height: 32px; flex: none; border: 0; border-radius: 8px; background: var(--surface-soft); color: var(--muted); cursor: pointer; font-size: 20px; line-height: 1; }
      .dialog-close:hover { background: #e2e8f0; color: var(--text); }
      .dialog-content { max-height: calc(100vh - 150px); padding: 18px 22px 24px; overflow-y: auto; }
      .legend-section + .legend-section { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
      .legend-section h3 { margin: 0 0 4px; font-size: 14px; }
      .legend-section > p { margin: 0 0 8px; color: var(--muted); font-size: 12px; }
      .dialog-content .definition-grid { padding: 4px 0 0; }

      @media (max-width: 980px) {
        .page { padding: 24px 16px 36px; }
        .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 560px) {
        .page-header { display: block; }
        .live-pill { margin-top: 16px; }
        .definition-grid { grid-template-columns: 1fr; }
        .table-toolbar { align-items: flex-start; flex-direction: column; }
        .toolbar-actions { width: 100%; justify-content: space-between; }
        .notice { text-align: left; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div>
          <h1>auto-chat 任务中心</h1>
          <p class="subtitle">查看任务、对话标签页、输出文件与当前运行配置</p>
        </div>
        <span class="live-pill"><span class="live-dot"></span>每 3 秒自动刷新</span>
      </header>

      <nav class="tabs" role="tablist" aria-label="管理页面">
        <button id="jobs-tab" class="tab-button" type="button" role="tab" aria-selected="true" aria-controls="jobs-panel" data-tab="jobs">任务列表</button>
        <button id="config-tab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="config-panel" data-tab="config">全局配置</button>
      </nav>

      <section id="jobs-panel" class="tab-panel" role="tabpanel" aria-labelledby="jobs-tab" data-tab-panel="jobs">
        <section id="stats" class="stats" aria-label="任务概览"></section>

        <section class="panel table-panel">
          <div class="table-toolbar">
            <div>
              <h2>任务列表</h2>
              <p>按创建时间倒序排列</p>
            </div>
            <div class="toolbar-actions">
              <p id="notice" class="notice" role="status"></p>
              <button id="open-legend" class="secondary-button" type="button">指标释义</button>
            </div>
          </div>
          <div class="table-scroll">
            <table>
              <colgroup>
                <col class="col-id" />
                <col class="col-platform" />
                <col class="col-status" />
                <col class="col-config" />
                <col class="col-output" />
                <col class="col-tab" />
                <col class="col-updated" />
                <col class="col-error" />
                <col class="col-action" />
              </colgroup>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>平台 / 类型</th>
                  <th>状态</th>
                  <th>任务配置</th>
                  <th>输出</th>
                  <th>标签页</th>
                  <th>更新时间</th>
                  <th>错误</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="jobs"></tbody>
            </table>
          </div>
        </section>
      </section>

      <section id="config-panel" class="tab-panel" role="tabpanel" aria-labelledby="config-tab" data-tab-panel="config" hidden>
        <article class="panel">
          <div class="panel-heading">
            <h2>当前系统全局配置</h2>
            <p>来自服务端 <code>/config</code>，影响所有任务和插件调度。</p>
          </div>
          <dl id="global-config" class="definition-grid"></dl>
        </article>
      </section>

      <dialog id="legend-dialog" aria-labelledby="legend-title">
        <div class="dialog-header">
          <div>
            <h2 id="legend-title">任务指标与配置释义</h2>
            <p>说明任务概览统计口径与任务 JSON 配置字段。</p>
          </div>
          <button id="close-legend" class="dialog-close" type="button" aria-label="关闭">×</button>
        </div>
        <div class="dialog-content">
          <section class="legend-section">
            <h3>任务概览指标</h3>
            <p>页面顶部四项统计的计算口径。</p>
            <dl id="stat-legend" class="definition-grid"></dl>
          </section>
          <section class="legend-section">
            <h3>任务配置字段</h3>
            <p>“任务配置”列展开后显示的完整 JSON 字段。</p>
            <dl id="job-config-legend" class="definition-grid"></dl>
          </section>
        </div>
      </dialog>
    </main>

    <script>
      const RUNNING_STATUSES = new Set([
        'opening_tab', 'waiting_chat_ready', 'uploading', 'waiting_upload_ready',
        'sending_prompt', 'waiting_generation', 'stalled', 'refreshing',
        'collecting_outputs', 'downloading'
      ]);
      const FAILED_STATUSES = new Set(['failed_retryable', 'failed_final', 'needs_manual']);
      const GLOBAL_CONFIG_DEFINITIONS = [
        ['maxConcurrency', '插件同时执行的最大任务数（1–8）。'],
        ['stallTimeoutMs', '页面无进展多久后判定为停滞，单位毫秒。'],
        ['hardTimeoutMs', '单个任务允许执行的最长时间，单位毫秒。'],
        ['maxRefreshPerJob', '任务停滞后允许自动刷新的最大次数。'],
        ['expectedImageCount', '图片任务未单独指定时使用的默认图片数。'],
        ['chatgptUrl', 'GPT 新任务默认打开的页面地址。'],
        ['geminiUrl', 'Gemini 新任务默认打开的页面地址。'],
        ['webhookUrls', '任务事件需要推送到的 webhook 地址列表。'],
        ['autoRetry', '可重试失败发生后是否自动重新入队。'],
        ['maxRetries', '开启自动重试时允许的最大尝试次数。']
      ];
      const JOB_CONFIG_DEFINITIONS = [
        ['id', '任务唯一标识。'],
        ['platform', '执行平台：gpt 或 gemini。'],
        ['mode', '任务类型：image 或 text。'],
        ['prompt', '发送给模型的主提示词。'],
        ['prompts', 'Gemini 多图任务按顺序发送的分图提示词。'],
        ['expectedImageCount', '本任务预期采集的图片数量。'],
        ['sourceImages', '随任务提交的源图片路径列表。'],
        ['metadata', '任务自定义元数据，也包含系统内部标记。'],
        ['persistTab', '任务完成后是否保留浏览器标签页。'],
        ['parentJobId', '复用对话时所关联的父任务 ID。'],
        ['autoChatReloadOnly', '仅重新加载并监控已有对话，不再次发送提示词。']
      ];
      const STAT_DEFINITIONS = [
        ['任务总数', '当前系统中保存的全部任务数量。'],
        ['排队中', '状态为 queued、等待插件领取的任务数量。'],
        ['执行中', '已经领取且处于打开页面、发送、生成或采集阶段的任务数量。'],
        ['需处理', '状态为 failed_retryable、failed_final 或 needs_manual 的任务数量。']
      ];
      let deletingId = null;
      const retryingIds = new Set();
      const recheckingIds = new Set();
      const jobRenderSignatures = new Map();

      renderJobConfigLegend();
      bindPageControls();
      refresh();
      setInterval(refresh, 3000);

      async function refresh() {
        try {
          const [jobs, config] = await Promise.all([fetchJson('/jobs'), fetchJson('/config')]);
          renderStats(jobs);
          renderGlobalConfig(config);
          renderJobs(jobs);
          await hydrateTextPreviews(jobs);
        } catch (error) {
          setNotice(`刷新失败：${error}`, true);
        }
      }

      async function fetchJson(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
        return response.json();
      }

      function renderStats(jobs) {
        const values = [
          ['任务总数', jobs.length],
          ['排队中', jobs.filter(job => job.status === 'queued').length],
          ['执行中', jobs.filter(job => RUNNING_STATUSES.has(job.status)).length],
          ['需处理', jobs.filter(job => FAILED_STATUSES.has(job.status)).length]
        ];
        document.querySelector('#stats').innerHTML = values.map(([label, value]) => `
          <article class="stat">
            <div class="stat-label">${escapeHtml(label)}</div>
            <div class="stat-value">${value}</div>
          </article>
        `).join('');
      }

      function renderGlobalConfig(config) {
        const knownKeys = new Set(GLOBAL_CONFIG_DEFINITIONS.map(([key]) => key));
        const definitions = [
          ...GLOBAL_CONFIG_DEFINITIONS,
          ...Object.keys(config).filter(key => !knownKeys.has(key)).map(key => [key, '服务端返回的扩展配置。'])
        ];
        document.querySelector('#global-config').innerHTML = definitions.map(([key, description]) => `
          <div class="definition">
            <dt>${escapeHtml(key)}</dt>
            <dd><span class="config-value">${escapeHtml(formatConfigValue(config[key]))}</span><br>${escapeHtml(description)}</dd>
          </div>
        `).join('');
      }

      function renderJobConfigLegend() {
        document.querySelector('#stat-legend').innerHTML = STAT_DEFINITIONS.map(([key, description]) => `
          <div class="definition">
            <dt>${escapeHtml(key)}</dt>
            <dd>${escapeHtml(description)}</dd>
          </div>
        `).join('');
        document.querySelector('#job-config-legend').innerHTML = JOB_CONFIG_DEFINITIONS.map(([key, description]) => `
          <div class="definition">
            <dt>${escapeHtml(key)}</dt>
            <dd>${escapeHtml(description)}</dd>
          </div>
        `).join('');
      }

      function bindPageControls() {
        document.querySelector('[role="tablist"]').addEventListener('click', event => {
          const button = event.target.closest('button[role="tab"]');
          if (button) activateTab(button.dataset.tab);
        });

        const dialog = document.querySelector('#legend-dialog');
        document.querySelector('#open-legend').addEventListener('click', () => dialog.showModal());
        document.querySelector('#close-legend').addEventListener('click', () => dialog.close());
        dialog.addEventListener('click', event => {
          if (event.target === dialog) dialog.close();
        });
      }

      function activateTab(name) {
        document.querySelectorAll('button[role="tab"]').forEach(button => {
          button.setAttribute('aria-selected', String(button.dataset.tab === name));
        });
        document.querySelectorAll('[data-tab-panel]').forEach(panel => {
          panel.hidden = panel.dataset.tabPanel !== name;
        });
      }

      function renderJobs(jobs) {
        const target = document.querySelector('#jobs');
        if (!jobs.length) {
          target.innerHTML = '<tr><td class="empty-row" colspan="9">暂无任务</td></tr>';
          jobRenderSignatures.clear();
          return;
        }
        target.querySelector('.empty-row')?.closest('tr')?.remove();
        const existingRows = new Map(
          Array.from(target.querySelectorAll('tr[data-job-id]')).map(row => [row.dataset.jobId, row])
        );
        const visibleIds = new Set();

        for (const job of jobs) {
          visibleIds.add(job.id);
          const signature = JSON.stringify([job, deletingId === job.id, retryingIds.has(job.id), recheckingIds.has(job.id)]);
          let row = existingRows.get(job.id);
          if (!row) {
            row = document.createElement('tr');
            row.dataset.jobId = job.id;
          }
          if (jobRenderSignatures.get(job.id) !== signature) {
            const wasConfigOpen = row.querySelector('details')?.open === true;
            row.innerHTML = renderJobCells(job);
            if (wasConfigOpen) row.querySelector('details').open = true;
            jobRenderSignatures.set(job.id, signature);
          }
          target.appendChild(row);
        }

        for (const [id, row] of existingRows) {
          if (visibleIds.has(id)) continue;
          row.remove();
          jobRenderSignatures.delete(id);
        }
      }

      function renderJobCells(job) {
        return `
          <td>
            <div class="job-id-cell">
              <div class="job-id">${escapeHtml(job.id)}</div>
              <button class="copy-id-button" type="button" data-copy-id="${escapeAttribute(job.id)}" aria-label="复制任务 ID ${escapeAttribute(job.id)}">复制</button>
            </div>
          </td>
          <td>
            <span class="platform">${escapeHtml(platformLabel(job.platform))}</span>
            <span class="mode">${escapeHtml(job.mode)}</span>
          </td>
          <td><span class="status ${statusClass(job.status)}">${escapeHtml(job.status)}</span></td>
          <td>${formatJobConfig(job)}</td>
          <td>${formatOutputs(job)}</td>
          <td>${formatConversationLink(job)}</td>
          <td>${formatDate(job.updatedAt)}</td>
          <td>${job.errorMessage ? `<span class="error-message">${escapeHtml(job.errorMessage)}</span>` : '<span class="empty-value">—</span>'}</td>
          <td>
            <div class="row-actions">
              ${RUNNING_STATUSES.has(job.status) && job.conversationUrl ? `
                <button class="recheck-button" data-recheck="${escapeAttribute(job.id)}" ${recheckingIds.has(job.id) ? 'disabled' : ''}>
                  ${recheckingIds.has(job.id) ? '检测中…' : '检测'}
                </button>
              ` : ''}
              ${FAILED_STATUSES.has(job.status) ? `
                <button class="retry-button" data-retry="${escapeAttribute(job.id)}" data-platform="${escapeAttribute(job.platform)}" ${retryingIds.has(job.id) || recheckingIds.has(job.id) ? 'disabled' : ''}>
                  ${retryingIds.has(job.id) ? '触发中…' : '重试'}
                </button>
              ` : ''}
              <button class="danger" data-delete="${escapeAttribute(job.id)}" ${deletingId === job.id || retryingIds.has(job.id) || recheckingIds.has(job.id) ? 'disabled' : ''}>
                ${deletingId === job.id ? '删除中…' : '删除'}
              </button>
            </div>
          </td>
        `;
      }

      document.querySelector('#jobs').addEventListener('click', async event => {
        const copyButton = event.target.closest('button[data-copy-id]');
        if (copyButton) {
          await copyJobId(copyButton.dataset.copyId, copyButton);
          return;
        }
        const retryButton = event.target.closest('button[data-retry]');
        if (retryButton) {
          await retryAndDispatch(retryButton.dataset.retry, retryButton.dataset.platform);
          return;
        }
        const recheckButton = event.target.closest('button[data-recheck]');
        if (recheckButton) {
          await recheckJob(recheckButton.dataset.recheck);
          return;
        }
        const button = event.target.closest('button[data-delete]');
        if (!button) return;
        const id = button.dataset.delete;
        if (!confirm(`确认删除任务 ${id}？保存的任务文件也会一并删除。`)) return;
        deletingId = id;
        setNotice(`正在删除 ${id}…`);
        await refresh();
        try {
          const response = await fetch(`/jobs/${encodeURIComponent(id)}`, { method: 'DELETE' });
          if (!response.ok) throw new Error(`${response.status} ${await response.text()}`);
          setNotice(`已删除 ${id}`);
        } catch (error) {
          setNotice(`删除失败：${error}`, true);
        } finally {
          deletingId = null;
          await refresh();
        }
      });

      async function copyJobId(id, button) {
        button.disabled = true;
        try {
          try {
            if (!navigator.clipboard?.writeText) throw new Error('Clipboard API unavailable');
            await navigator.clipboard.writeText(id);
          } catch {
            copyTextFallback(id);
          }
          button.textContent = '已复制';
          setNotice(`已复制任务 ID：${id}`);
        } catch (error) {
          setNotice(`复制失败：${error}`, true);
        } finally {
          setTimeout(() => {
            if (!button.isConnected) return;
            button.textContent = '复制';
            button.disabled = false;
          }, 1200);
        }
      }

      function copyTextFallback(value) {
        const textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        const copied = document.execCommand('copy');
        textarea.remove();
        if (!copied) throw new Error('浏览器拒绝了剪贴板写入');
      }

      async function retryAndDispatch(id, platform) {
        retryingIds.add(id);
        setNotice(`正在重新触发 ${id}…`);
        await refresh();
        let requeued = false;
        try {
          const retryResponse = await fetch(`/jobs/${encodeURIComponent(id)}/retry`, { method: 'POST' });
          if (!retryResponse.ok) throw new Error(`${retryResponse.status} ${await retryResponse.text()}`);
          requeued = true;
          const dispatchResponse = await fetch('/dispatch', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ platform, jobId: id })
          });
          if (!dispatchResponse.ok) throw new Error(`${dispatchResponse.status} ${await dispatchResponse.text()}`);
          setNotice(`已重新触发 ${id}`);
        } catch (error) {
          setNotice(requeued ? `任务已重新入队，但触发调度失败：${error}` : `重新触发失败：${error}`, true);
        } finally {
          retryingIds.delete(id);
          await refresh();
        }
      }

      async function recheckJob(id) {
        recheckingIds.add(id);
        setNotice(`正在打开页面并重新检测 ${id}…`);
        await refresh();
        try {
          const response = await fetch(`/jobs/${encodeURIComponent(id)}/recheck`, { method: 'POST' });
          if (!response.ok) throw new Error(`${response.status} ${await response.text()}`);
          setNotice(`已请求重新检测 ${id}，检测结果会自动同步到任务状态与输出`);
        } catch (error) {
          setNotice(`重新检测失败：${error}`, true);
        } finally {
          recheckingIds.delete(id);
          await refresh();
        }
      }

      function formatJobConfig(job) {
        const metadata = job.metadata && typeof job.metadata === 'object' ? job.metadata : {};
        const config = {
          id: job.id,
          platform: job.platform,
          mode: job.mode,
          prompt: job.prompt,
          prompts: Array.isArray(metadata.geminiPrompts) ? metadata.geminiPrompts : null,
          expectedImageCount: job.expectedImageCount,
          sourceImages: job.sourceImages,
          metadata,
          persistTab: job.persistTab,
          parentJobId: job.parentJobId,
          autoChatReloadOnly: metadata.autoChatReloadOnly === true
        };
        const chips = [
          `${job.expectedImageCount} 张输出`,
          `${job.sourceImages.length} 张源图`,
          job.persistTab ? '保留标签页' : '完成后关闭',
          job.parentJobId ? `父任务：${job.parentJobId}` : '独立对话',
          metadata.autoChatReloadOnly === true ? '仅重载监控' : '正常提交'
        ];
        return `
          <div class="config-summary">
            ${chips.map((chip, index) => `<span class="chip ${index === 4 && metadata.autoChatReloadOnly === true ? 'accent' : ''}">${escapeHtml(chip)}</span>`).join('')}
          </div>
          <details>
            <summary>查看全部配置</summary>
            <pre class="json">${escapeHtml(JSON.stringify(config, null, 2))}</pre>
          </details>
        `;
      }

      function formatConversationLink(job) {
        if (!job.conversationUrl) return '<span class="empty-value">未记录</span>';
        return `<a class="tab-link" href="${escapeAttribute(job.conversationUrl)}" target="_blank" rel="noopener noreferrer">打开 ${escapeHtml(platformLabel(job.platform))} ↗</a>`;
      }

      function formatOutputs(job) {
        if (job.mode === 'text') {
          const file = job.textOutputFile || job.outputFiles[0];
          if (!file) return '<span class="empty-value">暂无</span>';
          const name = outputName(file);
          return `
            <div class="outputs">
              <a class="output-link" href="${assetUrl(job.id, name)}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)} ↗</a>
              <span class="preview" data-text-output="${escapeAttribute(job.id)}" data-output-name="${escapeAttribute(name)}">加载预览中…</span>
            </div>
          `;
        }
        if (!job.outputFiles.length) return '<span class="empty-value">暂无</span>';
        return `
          <div class="outputs">
            ${job.outputFiles.map(file => {
              const name = outputName(file);
              return `<a class="output-link" href="${assetUrl(job.id, name)}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)} ↗</a>`;
            }).join('')}
          </div>
        `;
      }

      function formatDate(value) {
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return escapeHtml(value);
        const datePart = new Intl.DateTimeFormat('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }).format(date);
        const timePart = new Intl.DateTimeFormat('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }).format(date);
        return `<time datetime="${escapeAttribute(value)}" title="${escapeAttribute(value)}">${escapeHtml(datePart)}<br>${escapeHtml(timePart)}</time>`;
      }

      function formatConfigValue(value) {
        if (value === undefined) return '未设置';
        if (Array.isArray(value)) return value.length ? JSON.stringify(value) : '[]';
        if (typeof value === 'object' && value !== null) return JSON.stringify(value);
        return String(value);
      }

      function statusClass(status) {
        if (status === 'done') return 'done';
        if (status === 'queued') return 'queued';
        if (FAILED_STATUSES.has(status)) return 'failed';
        if (RUNNING_STATUSES.has(status)) return 'running';
        return '';
      }

      function setNotice(message, isError = false) {
        const notice = document.querySelector('#notice');
        notice.textContent = message;
        notice.classList.toggle('error', isError);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, char => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        })[char]);
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, '&#96;');
      }

      function platformLabel(platform) {
        return platform === 'gemini' ? 'Gemini' : 'GPT';
      }

      async function hydrateTextPreviews(jobs) {
        await Promise.all(jobs
          .filter(job => job.mode === 'text' && (job.textOutputFile || job.outputFiles[0]))
          .map(async job => {
            const file = job.textOutputFile || job.outputFiles[0];
            const name = outputName(file);
            const target = document.querySelector(`[data-text-output="${cssEscape(job.id)}"][data-output-name="${cssEscape(name)}"]`);
            if (!target || target.dataset.previewReady === 'true') return;
            target.dataset.previewReady = 'true';
            try {
              const response = await fetch(assetUrl(job.id, name));
              const text = response.ok ? await response.text() : '';
              target.textContent = text.replace(/\s+/g, ' ').trim().slice(0, 160) || '文本输出为空';
            } catch {
              target.textContent = '无法加载预览';
            }
          }));
      }

      function outputName(file) {
        const normalized = String(file).replaceAll('\\', '/');
        return normalized.slice(normalized.lastIndexOf('/') + 1);
      }

      function assetUrl(jobId, name) {
        return `/job-assets/${encodeURIComponent(jobId)}/outputs/${encodeURIComponent(name)}`;
      }

      function cssEscape(value) {
        return String(value).replace(/["\\]/g, '\\$&');
      }
    </script>
  </body>
</html>
