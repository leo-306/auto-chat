<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>auto-chat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">GPT / Gemini automation</p>
        <h1>auto-chat</h1>
      </div>
      <span id="server" class="status-pill">检测中</span>
    </header>

    <nav class="tabs" aria-label="平台">
      <button id="tab-gpt" class="tab active" data-platform="gpt">GPT</button>
      <button id="tab-gemini" class="tab" data-platform="gemini">Gemini</button>
    </nav>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>运行状态</h2>
          <p id="status-copy">正在读取插件状态。</p>
        </div>
      </div>
      <div class="actions">
        <button id="pause" class="primary">读取中</button>
        <button id="tick">执行一次调度</button>
        <button id="open-tab">切到任务标签页</button>
        <a href="http://127.0.0.1:17321/" target="_blank">打开本地控制台</a>
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>正在处理</h2>
          <p id="workers-copy">当前由插件接管的平台标签页和任务。</p>
        </div>
      </div>
      <div id="workers"></div>
    </section>

    <section class="panel">
      <div class="section-head">
        <div>
          <h2>最近信息</h2>
          <p>用于判断本地服务、页面和任务状态。</p>
        </div>
      </div>
      <pre id="debug-output">暂无调试输出</pre>
      <details class="advanced">
        <summary>高级/调试</summary>
        <div class="debug-grid">
          <button id="inspect">检查当前平台页</button>
          <button id="debug-success">模拟：保存成功</button>
          <button id="debug-error" class="warn">模拟：可重试错误</button>
          <button id="debug-stalled" class="warn">模拟：生成卡住</button>
          <button id="debug-timeout" class="danger">模拟：需要人工接管</button>
        </div>
      </details>
    </section>
    <script src="popup.js"></script>
  </body>
</html>
